# --- SERVIDOR ---
# Define a porta (pode manter 5000 para ser igual ao Python ou usar 8080 padr„o Java)
server.port=5000

# --- BANCO DE DADOS (MySQL) ---
# Substitui o sqlite:///... e a lůgica de DATABASE_URL do Python
spring.datasource.url=jdbc:mysql://localhost:3306/farmacia_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=SUA_SENHA_AQUI
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / HIBERNATE ---
# "update" cria/atualiza as tabelas automaticamente (igual ao db.create_all() do Python)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- LOGGING ---
# Substitui o logging.basicConfig do Python
logging.level.root=INFO
logging.level.com.farmacia=DEBUG
logging.file.name=app.log

# --- UPLOAD / ARQUIVOS (Opcional, se precisar no futuro) ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB